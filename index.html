<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Діалектологічна платформа України</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&display=swap');
    
    body { 
      margin: 0; 
      padding: 0; 
      font-family: 'Philosopher', 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    
    h1, h2, h3, .font-display {
      font-family: 'Philosopher', sans-serif;
      font-weight: 700;
    }
    
    .hero-section {
      position: relative;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 50%, #dee2e6 100%);
      overflow: hidden;
      min-height: 550px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .floating-letters {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    
    .letter {
      position: absolute;
      font-weight: 800;
      color: rgba(127, 29, 29, 0.4);
      animation: fade-float 10s infinite ease-in-out;
      text-shadow: 0 4px 20px rgba(127, 29, 29, 0.5);
      font-size: 5rem;
    }
    
    @keyframes fade-float {
      0%, 100% { opacity: 0.4; transform: translateY(0) rotate(-5deg); }
      50% { opacity: 0.6; transform: translateY(-30px) rotate(5deg); }
    }
    
    .stats-card {
      background: white;
      border-radius: 1.5rem;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border: 3px solid transparent;
      position: relative;
      overflow: hidden;
    }
    
    .stats-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #7f1d1d 0%, #991b1b 100%);
      transform: scaleX(0);
      transition: transform 0.4s ease;
    }
    
    .stats-card:hover::before {
      transform: scaleX(1);
    }
    
    .stats-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      border-color: #991b1b;
    }
    
    .stats-number {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #7f1d1d 0%, #991b1b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: all 0.3s ease;
    }
    
    .stats-card:hover .stats-number {
      transform: scale(1.1);
    }
    
    .nav-button {
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .nav-button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.5s, height 0.5s;
    }
    
    .nav-button:hover::before {
      width: 300px;
      height: 300px;
    }
    
    .nav-button:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(127, 29, 29, 0.4);
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-slide-down {
      animation: slideDown 0.8s ease-out;
    }
    
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse-border { 
      0%, 100% { border-color: #991b1b; }
      50% { border-color: #7f1d1d; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    
    #map { height: 100%; width: 100%; }
    .carousel-dots { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
    .carousel-dot { 
      width: 8px; 
      height: 8px; 
      border-radius: 50%; 
      background: #d1d5db; 
      cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .carousel-dot:hover { background: #9ca3af; }
    .carousel-dot.active { 
      background: linear-gradient(135deg, #991b1b 0%, #7f1d1d 100%); 
      width: 24px; 
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(127, 29, 29, 0.3);
    }
    
    .animate-fade-in { animation: fadeIn 0.5s ease-out; }
    .animate-slide-in { animation: slideIn 0.4s ease-out; }
    
    .glass-effect {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }
    
    .search-input:focus {
      box-shadow: 0 0 0 3px rgba(127, 29, 29, 0.1);
    }
    
    .card-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
    }
    
    .selected-card {
      animation: pulse-border 2s ease-in-out infinite;
    }
    
    .detail-info-card {
      transition: all 0.3s ease;
    }
    
    .detail-info-card:hover {
      box-shadow: 0 4px 12px rgba(127, 29, 29, 0.15);
      transform: translateY(-2px);
    }
    
    .audio-button {
      position: relative;
      overflow: hidden;
    }
    
    .audio-button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    
    .audio-button:hover::before {
      width: 300px;
      height: 300px;
    }
    
    .stat-badge {
      animation: float 3s ease-in-out infinite;
    }
    
    .text-scrollable {
      max-height: 300px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 #f1f5f9;
    }
    
    .text-scrollable::-webkit-scrollbar {
      width: 8px;
    }
    
    .text-scrollable::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 4px;
    }
    
    .text-scrollable::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    
    .text-scrollable::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { 
      background: #cbd5e1; 
      border-radius: 4px; 
    }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    .map-container-small {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .detail-panel-expanded {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    
    const API_ENDPOINT = 'https://script.google.com/macros/s/AKfycbyXB1rwbjiCQXg-ANDVXHFD26Y4lya9m0qZz9qQRPphBCOe7PQxx6Cort7HIR5AaP8S/exec';
    
    const cleanText = (txt) => {
      if (!txt) return '';
      return txt.toLowerCase().trim().replace(/[^\wа-яіїєґ]/gi, ' ').replace(/\s+/g, ' ');
    };
    
    const matchWord = (content, term) => {
      if (!content || !term) return false;
      const norm1 = cleanText(content);
      const norm2 = cleanText(term);
      const tokens = norm1.split(' ');
      return tokens.some(t => t === norm2 || t.includes(norm2));
    };
    
    function App() {
      const [view, setView] = useState('home');
      const [data, setData] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      const [err, setErr] = useState(null);
      const [query, setQuery] = useState('');
      const [active, setActive] = useState(null);
      const [slideIdx, setSlideIdx] = useState(0);
      const [filterReg, setFilterReg] = useState('');
      const [filterDist, setFilterDist] = useState('');
      const mapEl = useRef(null);
      const mapObj = useRef(null);
      const markers = useRef([]);
      
      useEffect(() => {
        if (data.length === 0 && !isLoading) {
          fetchData();
        }
      }, []);
      
      useEffect(() => {
        if (view === 'map' && data.length === 0 && !isLoading) {
          fetchData();
        }
      }, [view]);
      
      useEffect(() => {
        if (view === 'map' && !isLoading && mapEl.current && !mapObj.current) {
          mapObj.current = L.map(mapEl.current).setView([48.5, 31.5], 6);
          
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 18
          }).addTo(mapObj.current);
        }
      }, [view, isLoading]);

      useEffect(() => {
        if (mapObj.current) {
          setTimeout(() => {
            mapObj.current.invalidateSize();
          }, 450);
        }
      }, [active]);
      
      useEffect(() => {
        if (mapObj.current && !isLoading && view === 'map') {
          markers.current.forEach(m => m.remove());
          markers.current = [];
          
          results.forEach(item => {
            const selected = active?.id === item.id;
            
            const m = L.circleMarker([item.lat, item.lng], {
              radius: selected ? 10 : 6,
              fillColor: selected ? '#7f1d1d' : '#991b1b',
              color: '#fff',
              weight: 2,
              opacity: 1,
              fillOpacity: selected ? 1 : 0.9
            }).addTo(mapObj.current);
            
            m.on('click', () => {
              setActive(item);
              setSlideIdx(0);
            });
            
            if (selected) {
              m.bindPopup(`<b>${item.settlement}</b>`).openPopup();
            }
            
            markers.current.push(m);
          });
          
          if (results.length > 0) {
            const bnds = L.latLngBounds(results.map(r => [r.lat, r.lng]));
            mapObj.current.fitBounds(bnds, { padding: [50, 50] });
          }
        }
      }, [results, active, isLoading, view]);
      
      const results = useMemo(() => {
        let res = data;
        
        if (filterReg) {
          res = res.filter(d => d.region === filterReg);
        }
        
        if (filterDist) {
          res = res.filter(d => d.district === filterDist);
        }
        
        if (query.trim()) {
          const q = query.toLowerCase().trim();
          
          res = res.filter(d => {
            if (matchWord(d.transcription, q)) {
              return true;
            }
            
            if (matchWord(d.settlement, q)) {
              return true;
            }
            
            if (matchWord(d.literary, q)) {
              return true;
            }
            
            return false;
          });
        }
        
        return res;
      }, [query, data, filterReg, filterDist]);
      
      const regions = useMemo(() => {
        const regSet = new Set();
        data.forEach(d => {
          if (d.region) {
            const cleanRegion = d.region.trim().replace(/\s+/g, ' ');
            regSet.add(cleanRegion);
          }
        });
        return Array.from(regSet).sort();
      }, [data]);
      
      const districts = useMemo(() => {
        if (!filterReg) return [];
        const distSet = new Set();
        data.forEach(d => {
          if (d.district && d.region) {
            const cleanRegion = d.region.trim().replace(/\s+/g, ' ');
            const cleanDistrict = d.district.trim().replace(/\s+/g, ' ');
            if (cleanRegion === filterReg) {
              distSet.add(cleanDistrict);
            }
          }
        });
        return Array.from(distSet).sort();
      }, [data, filterReg]);
      
      const highlight = (txt, search) => {
        if (!txt || !search.trim()) return txt;
        
        const lower = search.toLowerCase().trim();
        const parts = txt.split(/(\s+)/);
        
        return parts.map((p, idx) => {
          const pClean = cleanText(p);
          const sClean = cleanText(lower);
          
          if (pClean && pClean.includes(sClean)) {
            return <mark key={idx} className="bg-yellow-300 px-1 rounded">{p}</mark>;
          }
          return p;
        });
      };
      
      const fetchData = async () => {
        setIsLoading(true);
        setErr(null);
        
        try {
          const resp = await fetch(API_ENDPOINT);
          if (!resp.ok) throw new Error('Помилка завантаження');
          
          const json = await resp.json();
          
          const processed = json.map((item, idx) => {
            let latitude = null, longitude = null;
            const coords = (item['Широта / Довгота'] || '').toString();
            if (coords) {
              const split = coords.split(/[,;\/\s]+/);
              if (split.length >= 2) {
                latitude = parseFloat(split[0]);
                longitude = parseFloat(split[1]);
              }
            }
            
            return {
              id: item['ID'] || 'rec' + idx,
              settlement: (item['Населений пункт'] || '').trim(),
              region: (item['Область'] || '').trim().replace(/\s+/g, ' '),
              district: (item['Район'] || '').trim().replace(/\s+/g, ' '),
              lat: latitude, 
              lng: longitude,
              dialect: (item['Діалект'] || item['ДІАЛЕКТ'] || '').trim(),
              subdialect: (item['Наріччя'] || item['НАРІЧЧЯ'] || '').trim(),
              transcription: (item['Транскрипція'] || item['ТРАНСКРИПЦІЯ'] || '').trim(),
              literary: (item['Літературний варіант'] || item['ЛІТЕРАТУРНИЙ ВАРІАНТ'] || '').trim(),
              keywords: (item['Ключові слова'] || item['КЛЮЧОВІ СЛОВА'] || '').trim(),
              audio: (item['Посилання_аудіо'] || item['ПОСИЛАННЯ_АУДІО'] || '').trim(),
              informantName: (item['Інформатор_ПІБ'] || item['ІНФОРМАТОР_ПІБ'] || '').trim(),
              informantBirthYear: (item['Інформатор_Рік народження'] || item['ІНФОРМАТОР_РІК НАРОДЖЕННЯ'] || '').toString().trim(),
              informantEducation: (item['Освіта'] || item['ОСВІТА'] || item['Інформатор_Освіта'] || '').trim(),
              settlementHistory: (item['Історія_НП'] || item['ІСТОРІЯ_НП'] || '').trim(),
              collector: (item['Збирач'] || item['ЗБИРАЧ'] || '').trim(),
              recordDate: (item['Дата запису'] || item['ДАТА ЗАПИСУ'] || '').toString().trim()
            };
          }).filter(d => d.lat && d.lng && !isNaN(d.lat) && !isNaN(d.lng));
          
          setData(processed);
        } catch (error) {
          setErr(error.message);
        } finally {
          setIsLoading(false);
        }
      };
      
      const slides = useMemo(() => {
        if (!active) return [];
        
        const arr = [];
        
        arr.push({
          title: 'Основна інформація',
          content: (
            <div className="space-y-4">
              <div className="border-b pb-3">
                <h3 className="font-bold text-xl text-gray-900 font-display">{active.settlement}</h3>
                <p className="text-sm text-gray-600">{active.region}</p>
                {active.district && (
                  <p className="text-sm text-gray-600">{active.district}</p>
                )}
              </div>
              
              {active.dialect && (
                <div className="bg-gray-50 p-4 rounded-xl border-2 border-gray-200 detail-info-card">
                  <p className="text-xs font-semibold text-gray-700 mb-1">ДІАЛЕКТ</p>
                  <p className="text-sm text-gray-900 font-medium">{active.dialect}</p>
                </div>
              )}
              
              {active.subdialect && (
                <div className="bg-gray-50 p-4 rounded-xl border-2 border-gray-200 detail-info-card">
                  <p className="text-xs font-semibold text-gray-700 mb-1">НАРІЧЧЯ</p>
                  <p className="text-sm text-gray-900 font-medium">{active.subdialect}</p>
                </div>
              )}
              
              {active.transcription && (
                <div>
                  <p className="text-xs font-semibold text-gray-700 mb-2">Транскрипція:</p>
                  <div className="text-sm bg-gray-50 p-4 rounded-xl border-2 border-gray-200 text-scrollable">
                    {highlight(active.transcription, query)}
                  </div>
                </div>
              )}
              
              {active.literary && (
                <div>
                  <p className="text-xs font-semibold text-gray-700 mb-2">Літературний варіант:</p>
                  <div className="text-sm bg-gray-50 p-4 rounded-xl border-2 border-gray-200 text-scrollable">
                    {highlight(active.literary, query)}
                  </div>
                </div>
              )}
            </div>
          )
        });
        
        if (active.informantName || active.informantBirthYear || active.collector || active.recordDate) {
          arr.push({
            title: 'Інформація про запис',
            content: (
              <div className="space-y-4">
                {active.informantName && (
                  <div className="bg-gray-50 p-4 rounded-xl border-2 border-gray-200">
                    <p className="text-xs text-gray-600 mb-2">Інформатор:</p>
                    <p className="text-sm font-medium text-gray-800">{active.informantName}</p>
                    {active.informantBirthYear && (
                      <p className="text-xs text-gray-700 mt-2 font-medium">Рік народження: {active.informantBirthYear}</p>
                    )}
                    {active.informantEducation && (
                      <p className="text-xs text-gray-500 mt-1">Освіта: {active.informantEducation}</p>
                    )}
                  </div>
                )}
                
                {!active.informantName && active.informantBirthYear && (
                  <div className="bg-gray-50 p-4 rounded-xl border-2 border-gray-200">
                    <p className="text-xs text-gray-600 mb-2">Інформатор:</p>
                    <p className="text-xs text-gray-700 font-medium">Рік народження: {active.informantBirthYear}</p>
                    {active.informantEducation && (
                      <p className="text-xs text-gray-500 mt-1">Освіта: {active.informantEducation}</p>
                    )}
                  </div>
                )}
                
                {active.collector && (
                  <div className="border-t pt-3">
                    <p className="text-xs text-gray-600 mb-1">Збирач:</p>
                    <p className="text-sm text-gray-800">{active.collector}</p>
                  </div>
                )}
                
                {active.recordDate && (
                  <div className="border-t pt-3">
                    <p className="text-xs text-gray-600 mb-1">Дата запису:</p>
                    <p className="text-sm text-gray-800">{active.recordDate}</p>
                  </div>
                )}
              </div>
            )
          });
        }
        
        if (active.settlementHistory) {
          arr.push({
            title: 'Історія населеного пункту',
            content: (
              <div>
                <p className="text-sm text-gray-800 leading-relaxed">{active.settlementHistory}</p>
              </div>
            )
          });
        }
        
        return arr;
      }, [active, query]);
      
      const switchToMap = () => {
        setView('map');
        setQuery('');
        setActive(null);
      };
      
      const switchToHome = () => {
        setView('home');
      };
      
      const statistics = useMemo(() => {
        const reg = new Set(data.map(d => d.region).filter(Boolean));
        const dial = new Set(data.map(d => d.dialect).filter(Boolean));
        const sett = new Set(data.map(d => d.settlement).filter(Boolean));
        const aud = data.filter(d => d.audio).length;
        
        return {
          totalRecords: data.length,
          totalRegions: reg.size,
          totalDialects: dial.size,
          totalSettlements: sett.size,
          recordsWithAudio: aud
        };
      }, [data]);
      
      return (
        <>
          <nav className="bg-white shadow-md sticky top-0 z-50">
            <div className="container mx-auto px-6 py-4 flex justify-between items-center">
              <div className="flex items-center gap-3">
                <img 
                  src="https://drive.google.com/uc?export=view&id=1PlAk2F6M3wmR1WSMai7gamheOzxzfzWG"
                  alt="Логотип"
                  className="w-12 h-auto"
                  onError={(e) => e.target.style.display='none'}
                />
                <h3 className="text-xl font-bold text-gray-800">Інтерактивна платформа діалектних текстів</h3>
              </div>
              {view === 'home' ? (
                <button onClick={switchToMap} className="nav-button bg-gradient-to-r from-red-900 to-red-800 text-white px-6 py-2.5 rounded-lg font-semibold relative z-10">
                  Карта
                </button>
              ) : (
                <button onClick={switchToHome} className="nav-button bg-gradient-to-r from-red-900 to-red-800 text-white px-6 py-2.5 rounded-lg font-semibold relative z-10">
                  Головна
                </button>
              )}
            </div>
          </nav>

          {view === 'home' && (
            <div>
              <section className="hero-section">
                <div className="floating-letters">
                  <div className="letter" style={{left: '10%', top: '20%', fontSize: '5rem', animationDelay: '0s'}}>А</div>
                  <div className="letter" style={{left: '25%', top: '60%', fontSize: '4.5rem', animationDelay: '2s'}}>Б</div>
                  <div className="letter" style={{left: '70%', top: '30%', fontSize: '5.5rem', animationDelay: '4s'}}>В</div>
                  <div className="letter" style={{left: '85%', top: '70%', fontSize: '4rem', animationDelay: '6s'}}>Г</div>
                  <div className="letter" style={{left: '50%', top: '15%', fontSize: '4.8rem', animationDelay: '1s'}}>Ґ</div>
                  <div className="letter" style={{left: '15%', top: '80%', fontSize: '5rem', animationDelay: '3s'}}>Д</div>

                </div>
                
                <div className="w-80 bg-white shadow-xl overflow-y-auto border-l">
                  {isLoading ? (
                    <div className="p-8 text-center">
                      <div className="w-10 h-10 border-4 border-red-900 border-t-transparent rounded-full mx-auto mb-3 spinner" />
                      <p className="text-sm text-gray-600">Завантаження...</p>
                    </div>
                  ) : !query && !filterReg && !filterDist ? (
                    <div className="p-8 text-center text-gray-500">
                      <p className="mb-2 font-medium">Введіть словоформу або оберіть фільтри</p>
                    </div>
                  ) : results.length === 0 ? (
                    <div className="p-8 text-center text-gray-500">
                      <p>Нічого не знайдено</p>
                    </div>
                  ) : (
                    <div className="divide-y">
                      {results.map(rec => (
                        <div
                          key={rec.id}
                          onClick={() => {
                            setActive(rec);
                            setSlideIdx(0);
                          }}
                          className={`p-4 cursor-pointer hover:bg-gray-50 transition card-hover ${
                            active?.id === rec.id ? 'bg-gray-100 border-l-4 border-red-900 selected-card' : ''
                          }`}
                        >
                          <h3 className="font-semibold text-gray-900 font-display">{rec.settlement}</h3>
                          <p className="text-xs text-gray-500">{rec.region}</p>
                          {rec.literary && (
                            <p className="text-xs mt-2 line-clamp-2">
                              <span className="font-medium text-red-900">Літературний варіант:</span> {highlight(rec.literary, query)}
                            </p>
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                
                {active && (
                  <div className="bg-white shadow-xl overflow-y-auto border-l animate-slide-in flex-1 detail-panel-expanded">
                    <div className="sticky top-0 bg-gradient-to-r from-red-900 to-red-800 text-white p-4 flex justify-between items-center z-10 shadow-lg">
                      <h2 className="font-bold text-lg font-display">Детальна інформація</h2>
                      <button onClick={() => setActive(null)} className="text-xl hover:text-gray-200 transition hover:rotate-90 duration-300">✕</button>
                    </div>
                    
                    <div className="p-6">
                      <div className="flex items-center justify-between mb-4">
                        <button
                          onClick={() => setSlideIdx(Math.max(0, slideIdx - 1))}
                          disabled={slideIdx === 0}
                          className="p-2 rounded-full hover:bg-gray-100 disabled:opacity-30 disabled:cursor-not-allowed transition"
                        >
                          ◀
                        </button>
                        
                        <h3 className="text-sm font-semibold text-red-900 text-center flex-1">
                          {slides[slideIdx]?.title}
                        </h3>
                        
                        <button
                          onClick={() => setSlideIdx(Math.min(slides.length - 1, slideIdx + 1))}
                          disabled={slideIdx === slides.length - 1}
                          className="p-2 rounded-full hover:bg-gray-100 disabled:opacity-30 disabled:cursor-not-allowed transition"
                        >
                          ▶
                        </button>
                      </div>
                      
                      <div className="min-h-[400px]">
                        {slides[slideIdx]?.content}
                      </div>
                      
                      {slides.length > 1 && (
                        <div className="carousel-dots">
                          {slides.map((_, i) => (
                            <div
                              key={i}
                              onClick={() => setSlideIdx(i)}
                              className={`carousel-dot ${i === slideIdx ? 'active' : ''}`}
                            />
                          ))}
                        </div>
                      )}
                      
                      {active.audio && (
                        <button
                          onClick={() => window.open(active.audio, '_blank')}
                          className="w-full mt-6 bg-gradient-to-r from-red-900 to-red-800 text-white py-3 rounded-xl hover:shadow-xl transition-all font-medium hover:scale-105 audio-button relative"
                        >
                          <span className="relative z-10">Прослухати аудіо</span>
                        </button>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </>
      );
    }
    
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
